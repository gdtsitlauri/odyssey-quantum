experiment_name: public_unsw_odyssey
inherits: configs/base.yaml
seed: 13
seeds: [13]
data:
  source: unsw_nb15
  sequence_mode: false
  time_aware_split: true
  public:
    dataset: unsw_nb15
    root: data/raw/unsw_nb15
    max_rows: 5000
    use_official_split: true
model:
  name: odyssey_risk
  require_quantum: false
  quantum_enabled: false
  uncertainty_mode: zero
  encoder_hidden_dim: 48
  encoder_latent_dim: 16
  combiner_init:
    alpha: 1.25
    beta: 0.2
    gamma: 0.1
    delta: 0.15
training:
  epochs: 5
  batch_size: 128
  patience: 2
search:
  enabled: false

