experiment_name: public_unsw_odyssey_aggressive
inherits: configs/public_unsw_odyssey.yaml
model:
  encoder_hidden_dim: 64
  encoder_latent_dim: 24
  dropout: 0.1
  combiner_init:
    alpha: 1.5
    beta: 0.15
    gamma: 0.05
    delta: 0.1
training:
  epochs: 6
  batch_size: 128
  patience: 3
  learning_rate: 0.0005
  weight_decay: 0.00005
  lambda_attack: 0.5
  posthoc_blend:
    enabled: true
    risk_weights: [0.0, 0.1, 0.2, 0.35, 0.5, 0.7, 1.0]
    temperatures: [0.8, 0.9, 1.0, 1.1, 1.25]
  teacher_ensemble:
    enabled: true
    members: [logistic_regression, random_forest]
    components: [random_forest_prob, risk_prob, attack_prob, logistic_regression_prob]
    component_weight_grid:
      random_forest_prob: [0.0, 0.4, 0.7, 1.0]
      risk_prob: [0.0, 0.1, 0.2]
      attack_prob: [0.0, 0.1]
      logistic_regression_prob: [0.0, 0.05]
features:
  disable_fragility: true
search:
  enabled: false
  max_trials: 8
  learning_rates: [0.0005]
  hidden_dims: [64]
  latent_dims: [24]
  alpha_values: [1.25, 1.5]
  beta_values: [0.05, 0.15]
  gamma_values: [0.0]
  delta_values: [0.05, 0.1]
  dropout_values: [0.05, 0.1, 0.15]
  weight_decays: [0.00005]
  lambda_attack_values: [0.35, 0.5]
  disable_fragility_values: [true]
  quantum_enabled_values: [true, false]
  uncertainty_modes: ["auto", "zero"]
